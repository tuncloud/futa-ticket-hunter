version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: futa-postgres
    environment:
      POSTGRES_DB: futa_hunter
      POSTGRES_USER: futa
      POSTGRES_PASSWORD: futa_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

volumes:
  pgdata:
