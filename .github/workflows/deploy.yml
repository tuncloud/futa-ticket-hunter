name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (ignored if action is restart)'
        required: false
        default: 'latest'
      action:
        description: 'Action to perform'
        type: choice
        options:
          - deploy
          - restart
        default: deploy
  repository_dispatch:
    types: [deploy-production]

jobs:
  deploy:
    uses: tuncloud/workflow/.github/workflows/cd-deploy.yml@main
    with:
      namespace: futa
      deployment-name: futa-ticket-hunter
      targets: api,worker
      image-tag: ${{ github.event.inputs.tag || github.event.client_payload.tag || 'latest' }}
      deployment-type: ${{ github.event.inputs.action || github.event.client_payload.action || 'deploy' }}
      notify: true
    secrets: inherit
