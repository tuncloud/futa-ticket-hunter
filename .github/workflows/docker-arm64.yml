name: Build And Push Arm64 Images

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/docker-arm64.yml
      - cmd/**
      - internal/**
      - go.mod
      - go.sum
      - config.yaml
  workflow_dispatch:

permissions:
  contents: read

env:
  API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/futa-ticket-hunter-api
  WORKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/futa-ticket-hunter-worker

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API image (native arm64)
        run: |
          docker build \
            --target api \
            -t ${{ env.API_IMAGE }}:latest \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            .

      - name: Push API image
        run: |
          docker push ${{ env.API_IMAGE }}:latest
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build Worker image (native arm64)
        run: |
          docker build \
            --target worker \
            -t ${{ env.WORKER_IMAGE }}:latest \
            -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            .

      - name: Push Worker image
        run: |
          docker push ${{ env.WORKER_IMAGE }}:latest
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}

  notify-telegram:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *Images Pushed Successfully!*
            
            *Repository:* ${{ github.repository }}
            *Tag:* `${{ github.sha }}`
            *API:* `${{ env.API_IMAGE }}`
            *Worker:* `${{ env.WORKER_IMAGE }}`
            
            Click the button below to trigger the deployment.
          inline_keyboard: |
            [{"text": "🚀 Deploy to Production", "url": "https://github.com/${{ github.repository }}/actions/workflows/deploy.yml"}]
