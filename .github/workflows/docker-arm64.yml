name: Build And Push Arm64 Images

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/docker-arm64.yml
      - cmd/**
      - internal/**
      - go.mod
      - go.sum
      - config.yaml
  workflow_dispatch:

permissions:
  contents: write   # required for the CI workflow to create semver git tags

jobs:
  build-and-push:
    uses: tuncloud/workflow/.github/workflows/ci-build-push.yml@main
    with:
      deployment-name: futa-ticket-hunter
      targets: api,worker
      notify: true
      notify-button-text: "\U0001F680 Deploy to Production"
      notify-button-url: "https://github.com/${{ github.repository }}/actions/workflows/deploy.yml"
    secrets: inherit
